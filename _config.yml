# ============================================================
#  Site
# ============================================================
title: "Sunpill Kim"
tagline: "Ph.D. candidate · AI Security · Hanyang University"
description: >-
  Personal website of Sunpill Kim — Ph.D. candidate in Applied
  Mathematics at Hanyang University, working on the security and
  vulnerability of metric-learning-based recognition systems.

author:
  name: "Sunpill Kim"
  korean: "김선필 · 金善必"
  email: "ksp0352@gmail.com"
  affiliation: "Hanyang University"
  scholar: "https://scholar.google.com/citations?user=YOUR_ID"
  github: "https://github.com/Sunpill"
  orcid: "https://orcid.org/YOUR_ORCID"

# ============================================================
#  URL settings
#  ----------------------------------------------------------
#  IMPORTANT — there are TWO scenarios, swap based on where
#  the site is deployed:
#
#  (1) TEST DEPLOYMENT at sunpill.github.io/sunpillkim-test/
#      url:     "https://sunpill.github.io"
#      baseurl: "/sunpillkim-test"
#
#  (2) PRODUCTION at sunpillkim.com  (your real site)
#      url:     "https://sunpillkim.com"
#      baseurl: ""
#
#  Currently set to (1) — test repo. When you move to the real
#  repo, swap to (2) and bring back the CNAME file.
# ============================================================
url: "https://sunpill.github.io"
baseurl: "/sunpillkim-test"

# ============================================================
#  Build
# ============================================================
markdown: kramdown
highlighter: rouge
permalink: /:path/

defaults:
  - scope: { path: "" }
    values:
      layout: "default"

include:
  - CNAME

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules

# ============================================================
#  Plugins (GitHub Pages whitelist)
# ============================================================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# ============================================================
#  SEO
# ============================================================
twitter:
  username: ""
social:
  name: "Sunpill Kim"
  links:
    - "https://github.com/Sunpill"
